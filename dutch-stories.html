<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dutch Stories | Complete Learning System</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --google-blue: #1A73E8;
            --google-red: #EA4335;
            --google-yellow: #FBBC04;
            --google-green: #34A853;
            --google-gray-900: #202124;
            --google-gray-800: #3C4043;
            --google-gray-700: #5F6368;
            --google-gray-200: #E8EAED;
            --google-gray-100: #F1F3F4;
            --google-white: #FFFFFF;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 24px;
        }
        body { font-family: 'Google Sans', sans-serif; background: linear-gradient(135deg, var(--google-gray-100) 0%, var(--google-white) 100%); }
        .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--google-gray-200); position: sticky; top: 0; z-index: 1000; }
        .navbar-brand { font-weight: 700; font-size: 1.5rem; background: linear-gradient(135deg, var(--google-blue), var(--google-green)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-link { color: var(--google-gray-700) !important; font-weight: 500; transition: 0.2s; }
        .nav-link:hover { color: var(--google-blue) !important; }
        .material-card { background: var(--google-white); border-radius: var(--radius-lg); box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3); transition: 0.3s; overflow: hidden; cursor: pointer; height: 100%; }
        .material-card:hover { transform: translateY(-4px); box-shadow: 0 4px 8px 0 rgba(60,64,67,0.3); }
        .story-card-header { background: linear-gradient(135deg, var(--google-blue), var(--google-green)); padding: 1.5rem; color: white; }
        .stat-card { background: var(--google-white); border-radius: var(--radius-lg); padding: 1.5rem; text-align: center; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3); }
        .stat-number { font-size: 2rem; font-weight: 700; color: var(--google-blue); }
        .btn-google { background: var(--google-blue); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 50px; font-weight: 500; transition: 0.2s; }
        .btn-google:hover { background: #1557b0; transform: translateY(-1px); }
        .btn-outline-google { background: transparent; color: var(--google-blue); border: 2px solid var(--google-blue); padding: 0.75rem 1.5rem; border-radius: 50px; font-weight: 500; transition: 0.2s; }
        .btn-outline-google:hover { background: var(--google-blue); color: white; }
        .reading-panel { background: var(--google-white); border-radius: var(--radius-lg); padding: 2rem; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3); margin-bottom: 2rem; }
        .game-panel { background: var(--google-white); border-radius: var(--radius-lg); padding: 2rem; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3); }
        .quiz-option { background: var(--google-gray-100); border-radius: var(--radius-md); padding: 1rem; margin-bottom: 0.75rem; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .quiz-option:hover { background: var(--google-gray-200); transform: translateX(4px); }
        .quiz-option.selected { border-color: var(--google-blue); background: rgba(26,115,232,0.1); }
        .quiz-option.correct { background: rgba(52,168,83,0.15); border-color: var(--google-green); }
        .quiz-option.wrong { background: rgba(234,67,53,0.1); border-color: var(--google-red); }
        .badge-google { background: linear-gradient(135deg, var(--google-blue), var(--google-green)); color: white; padding: 0.5rem 1rem; border-radius: 50px; font-weight: 500; }
        .progress { height: 8px; border-radius: 10px; background: var(--google-gray-200); }
        .progress-bar { background: linear-gradient(90deg, var(--google-blue), var(--google-green)); border-radius: 10px; }
        .level-progress { background: linear-gradient(135deg, var(--google-yellow), var(--google-red)); border-radius: var(--radius-lg); padding: 1rem; margin-bottom: 1rem; }
        .toast-google { background: var(--google-gray-900); color: white; border-radius: var(--radius-md); padding: 1rem 1.5rem; position: fixed; bottom: 2rem; right: 2rem; z-index: 1100; transform: translateX(400px); transition: transform 0.3s; }
        .toast-google.show { transform: translateX(0); }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; }
        .game-card { background: linear-gradient(135deg, white, var(--google-gray-100)); border-radius: var(--radius-lg); padding: 1.5rem; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid var(--google-gray-200); }
        .game-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .game-icon { font-size: 3rem; margin-bottom: 1rem; }
        .difficulty-easy { background: #34A853; color: white; font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 20px; display: inline-block; }
        .difficulty-medium { background: #FBBC04; color: #202124; font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 20px; display: inline-block; }
        .difficulty-hard { background: #EA4335; color: white; font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 20px; display: inline-block; }
        .vocab-word { background: linear-gradient(120deg, rgba(251,188,4,0.2) 0%, rgba(251,188,4,0.2) 100%); cursor: pointer; padding: 0 2px; border-radius: 4px; }
        .word-tile { background: var(--google-blue); color: white; padding: 0.5rem 1rem; border-radius: var(--radius-md); margin: 0.25rem; display: inline-block; cursor: pointer; }
        .sentence-builder-area { min-height: 80px; background: var(--google-gray-100); border-radius: var(--radius-md); padding: 1rem; margin: 1rem 0; }
        .match-card { background: var(--google-gray-100); border-radius: var(--radius-md); padding: 1rem; text-align: center; cursor: pointer; min-width: 100px; }
        .match-card.selected { background: var(--google-blue); color: white; }
        .match-card.matched { background: var(--google-green); color: white; opacity: 0.6; cursor: default; }
        .timer-circle { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, var(--google-blue), var(--google-green)); display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        .timer-text { font-size: 2rem; font-weight: 700; color: white; }
        .flashcard { perspective: 1000px; cursor: pointer; height: 200px; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-lg); padding: 1rem; }
        .flashcard-front { background: linear-gradient(135deg, var(--google-blue), var(--google-green)); color: white; transform: rotateY(0deg); }
        .flashcard-back { background: var(--google-gray-200); color: var(--google-gray-900); transform: rotateY(180deg); }
        .review-card { background: var(--google-white); border-radius: var(--radius-md); padding: 1rem; margin-bottom: 1rem; border-left: 4px solid var(--google-blue); }
        @media (max-width: 768px) { .reading-panel, .game-panel { padding: 1rem; } .game-grid { grid-template-columns: repeat(2, 1fr); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in-up { animation: fadeInUp 0.5s ease forwards; }
        .spinner-google { width: 40px; height: 40px; border: 3px solid var(--google-gray-200); border-top-color: var(--google-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#" id="homeLink"><i class="fas fa-book-open me-2"></i>Dutch<span style="color: var(--google-blue);">Stories</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="#" id="navHome"><i class="fas fa-home me-1"></i> Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="navStories"><i class="fas fa-book me-1"></i> Stories</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="navVocabulary"><i class="fas fa-graduation-cap me-1"></i> Words</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="navReview"><i class="fas fa-clock me-1"></i> Review</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="navFlashcards"><i class="fas fa-images me-1"></i> Flashcards</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="navGames"><i class="fas fa-gamepad me-1"></i> Games</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="navProgress"><i class="fas fa-chart-line me-1"></i> Progress</a></li>
            </ul>
            <div class="ms-3 d-flex gap-2">
                <span class="badge-google" id="levelBadge"><i class="fas fa-star me-1"></i> Level 1</span>
                <span class="badge-google" id="streakBadge"><i class="fas fa-fire me-1"></i> <span id="streakCount">0</span> days</span>
                <button class="btn btn-sm btn-outline-google" id="pomodoroBtn" style="padding: 0.25rem 0.75rem;"><i class="fas fa-hourglass-half me-1"></i> Timer</button>
            </div>
        </div>
    </div>
</nav>

<main class="container py-4" id="mainContent">
    <div class="text-center py-5" id="loadingDiv">
        <div class="spinner-google mb-3"></div>
        <p class="text-muted">Loading your Dutch learning system...</p>
    </div>
</main>

<div id="toastContainer" style="position: fixed; bottom: 20px; right: 20px; z-index: 1090;"></div>

<!-- Pomodoro Modal -->
<div class="modal fade" id="pomodoroModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header" style="background: linear-gradient(135deg, var(--google-blue), var(--google-green)); color: white;">
                <h5 class="modal-title"><i class="fas fa-hourglass-half me-2"></i>Pomodoro Timer</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center py-4">
                <div class="timer-circle mb-3"><div class="timer-text" id="timerDisplay">25:00</div></div>
                <div id="timerPhase" class="mb-2">📚 Study Time</div>
                <div class="progress mb-3"><div class="progress-bar" id="timerProgress" style="width: 100%"></div></div>
                <div class="d-flex gap-2 justify-content-center">
                    <button class="btn-google" id="timerStartBtn"><i class="fas fa-play me-1"></i> Start</button>
                    <button class="btn btn-outline-google" id="timerPauseBtn"><i class="fas fa-pause me-1"></i> Pause</button>
                    <button class="btn btn-outline-google" id="timerResetBtn"><i class="fas fa-redo me-1"></i> Reset</button>
                </div>
                <div class="mt-3 small text-muted">🍅 25 min study → 5 min break → repeat</div>
            </div>
        </div>
    </div>
</div>

<!-- Sentence Writing Modal -->
<div class="modal fade" id="sentenceModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background: linear-gradient(135deg, var(--google-blue), var(--google-green)); color: white;">
                <h5 class="modal-title"><i class="fas fa-pen-fancy me-2"></i>Elaboration Practice</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="sentenceWord" class="h4 text-center mb-3"></div>
                <div id="sentenceExample" class="alert alert-light small mb-3"></div>
                <textarea id="sentenceInput" class="form-control mb-3" rows="4" placeholder="Write a sentence using this word in Dutch..."></textarea>
                <div id="sentenceFeedback" class="small text-muted"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline-google" id="sentenceSaveBtn"><i class="fas fa-save me-1"></i> Save & Earn XP</button>
                <button class="btn btn-outline-google" id="sentenceNextBtn">Next Word <i class="fas fa-arrow-right ms-1"></i></button>
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================
    // APP STATE
    // ============================================
    let appData = null;
    let currentView = 'home';
    let currentStoryId = 1;
    
    // Pomodoro Timer
    let pomodoroInterval = null;
    let pomodoroTime = 25 * 60;
    let pomodoroPhase = 'study';
    let pomodoroRunning = false;
    
    // Sentence Practice
    let sentenceQueue = [];
    let currentSentenceWord = null;
    
    // ============================================
    // USER PROGRESS WITH ALL TECHNIQUES
    // ============================================
    let userProgress = {
        totalXP: 0, level: 1, streak: 0, lastLoginDate: null,
        completedStories: [], storyStars: {}, storyQuizScores: {},
        vocabularyLearning: {}, vocabularyMastered: [], wordReviewQueue: [],
        badges: [], quizzesTaken: 0, correctAnswers: 0,
        gameScores: {},
        // Spaced Repetition System
        spacedRepetition: {},  // word -> { strength, nextReview, reviewCount }
        // Elaboration Practice
        userSentences: [],      // { word, sentence, date }
        // Dual Coding - word emojis
        wordEmojis: {},
        // Pomodoro Stats
        studySessions: 0,
        totalStudyTime: 0
    };
    
    // Word category emojis for Dual Coding
    const categoryEmojis = {
        noun: "📦", verb: "⚡", adjective: "🎨", adverb: "⏱️",
        food: "🍎", animals: "🐕", place: "🏠", family: "👨‍👩‍👧",
        time: "⏰", emotion: "😊", action: "🏃", object: "🔧",
        profession: "👔", color: "🎨", number: "🔢", phrase: "💬",
        default: "📚"
    };
    
    const achievements = {
        first_story: { id: 'first_story', name: 'First Steps', description: 'Complete your first story', icon: 'fa-book', xpReward: 50 },
        five_stories: { id: 'five_stories', name: 'Story Explorer', description: 'Complete 5 stories', icon: 'fa-layer-group', xpReward: 100 },
        ten_stories: { id: 'ten_stories', name: 'Master Storyteller', description: 'Complete 10 stories', icon: 'fa-crown', xpReward: 200 },
        seven_day_streak: { id: 'seven_day_streak', name: 'On Fire!', description: '7-day learning streak', icon: 'fa-fire', xpReward: 150 },
        spaced_master: { id: 'spaced_master', name: 'Spaced Repetition Master', description: 'Review 100 words on schedule', icon: 'fa-clock', xpReward: 100 },
        sentence_writer: { id: 'sentence_writer', name: 'Sentence Creator', description: 'Write 20 sentences', icon: 'fa-pen-fancy', xpReward: 75 },
        pomodoro_champ: { id: 'pomodoro_champ', name: 'Focus Champion', description: 'Complete 10 study sessions', icon: 'fa-hourglass-half', xpReward: 100 }
    };
    
    // ============================================
    // INITIALIZATION
    // ============================================
    $(document).ready(function() {
        loadUserProgress();
        setupEventListeners();
        loadData();
        initPomodoroModal();
    });
    
    function initPomodoroModal() {
        $('#timerStartBtn').click(startPomodoro);
        $('#timerPauseBtn').click(pausePomodoro);
        $('#timerResetBtn').click(resetPomodoro);
        $('#pomodoroBtn').click(() => $('#pomodoroModal').modal('show'));
    }
    
    function startPomodoro() {
        if (pomodoroRunning) return;
        pomodoroRunning = true;
        pomodoroInterval = setInterval(() => {
            if (pomodoroTime <= 0) {
                completePomodoroPhase();
            } else {
                pomodoroTime--;
                updateTimerDisplay();
            }
        }, 1000);
    }
    
    function pausePomodoro() {
        pomodoroRunning = false;
        if (pomodoroInterval) clearInterval(pomodoroInterval);
    }
    
    function resetPomodoro() {
        pausePomodoro();
        pomodoroTime = pomodoroPhase === 'study' ? 25 * 60 : 5 * 60;
        updateTimerDisplay();
    }
    
    function completePomodoroPhase() {
        pausePomodoro();
        if (pomodoroPhase === 'study') {
            userProgress.studySessions++;
            userProgress.totalStudyTime += 25;
            addXP(25);
            saveUserProgress();
            showToast("✅ Study session complete! +25 XP 🍅");
            pomodoroPhase = 'break';
            pomodoroTime = 5 * 60;
            $('#timerPhase').html("☕ Break Time - Relax for 5 minutes!");
        } else {
            pomodoroPhase = 'study';
            pomodoroTime = 25 * 60;
            $('#timerPhase').html("📚 Study Time - Focus for 25 minutes!");
        }
        updateTimerDisplay();
        if (userProgress.studySessions === 10) checkAchievements('pomodoro_champ');
    }
    
    function updateTimerDisplay() {
        const minutes = Math.floor(pomodoroTime / 60);
        const seconds = pomodoroTime % 60;
        $('#timerDisplay').text(`${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`);
        const percent = (pomodoroTime / (pomodoroPhase === 'study' ? 25 * 60 : 5 * 60)) * 100;
        $('#timerProgress').css('width', `${percent}%`);
    }
    
    function loadData() {
        $.getJSON('dutch-stories.json')
            .done(function(data) {
                appData = data;
                $('#loadingDiv').hide();
                if (!userProgress.spacedRepetition) userProgress.spacedRepetition = {};
                if (!userProgress.userSentences) userProgress.userSentences = [];
                if (!userProgress.wordEmojis) userProgress.wordEmojis = {};
                
                if (appData.stories) {
                    appData.stories.forEach(story => {
                        if (story.vocabulary) {
                            story.vocabulary.forEach(word => {
                                if (userProgress.vocabularyLearning[word.dutch] === undefined)
                                    userProgress.vocabularyLearning[word.dutch] = 0;
                                if (!userProgress.spacedRepetition[word.dutch]) {
                                    userProgress.spacedRepetition[word.dutch] = {
                                        strength: 0,
                                        nextReview: new Date().toISOString(),
                                        reviewCount: 0,
                                        category: word.category || 'default'
                                    };
                                }
                                if (!userProgress.wordEmojis[word.dutch]) {
                                    userProgress.wordEmojis[word.dutch] = categoryEmojis[word.category] || categoryEmojis.default;
                                }
                            });
                        }
                    });
                }
                saveUserProgress();
                renderHomePage();
            })
            .fail(() => $('#loadingDiv').html(`<div class="alert alert-danger">Could not load dutch-stories.json</div>`));
    }
    
    function loadUserProgress() {
        const saved = localStorage.getItem('dutch_learner_complete');
        if (saved) Object.assign(userProgress, JSON.parse(saved));
        const today = new Date().toDateString();
        if (userProgress.lastLoginDate !== today) {
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            userProgress.streak = userProgress.lastLoginDate === yesterday.toDateString() ? (userProgress.streak || 0) + 1 : 1;
            userProgress.lastLoginDate = today;
            saveUserProgress();
        }
        updateLevelDisplay();
        checkDueReviews();
    }
    
    function checkDueReviews() {
        const today = new Date();
        const dueWords = [];
        for (const [word, data] of Object.entries(userProgress.spacedRepetition)) {
            if (data.nextReview && new Date(data.nextReview) <= today && data.strength < 80) {
                dueWords.push(word);
            }
        }
        if (dueWords.length > 0 && currentView !== 'review') {
            setTimeout(() => showToast(`📚 You have ${dueWords.length} words due for review!`, 'info'), 2000);
        }
    }
    
    function saveUserProgress() { localStorage.setItem('dutch_learner_complete', JSON.stringify(userProgress)); }
    function updateLevelDisplay() {
        userProgress.level = Math.floor(userProgress.totalXP / 100) + 1;
        $('#levelBadge').html(`<i class="fas fa-star me-1"></i> Level ${userProgress.level}`);
        $('#streakCount').text(userProgress.streak || 0);
    }
    
    function addXP(amount) { userProgress.totalXP += amount; updateLevelDisplay(); saveUserProgress(); showToast(`+${amount} XP`); }
    function showToast(msg) {
        const toast = $(`<div class="toast-google show">${msg}</div>`);
        $('#toastContainer').append(toast);
        setTimeout(() => { toast.removeClass('show'); setTimeout(() => toast.remove(), 300); }, 3000);
    }
    
    window.speakText = function(text, lang = 'nl-NL') {
        if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang; utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
    };
    
    function setupEventListeners() {
        $('#homeLink, #navHome').click(e => { e.preventDefault(); renderHomePage(); });
        $('#navStories').click(e => { e.preventDefault(); renderStoriesPage(); });
        $('#navVocabulary').click(e => { e.preventDefault(); renderVocabularyPage(); });
        $('#navReview').click(e => { e.preventDefault(); renderSpacedRepetitionPage(); });
        $('#navFlashcards').click(e => { e.preventDefault(); renderFlashcardsPage(); });
        $('#navGames').click(e => { e.preventDefault(); renderGamesHub(); });
        $('#navProgress').click(e => { e.preventDefault(); renderProgressPage(); });
    }
    
    // ============================================
    // SPACED REPETITION (FULL SYSTEM)
    // ============================================
    function scheduleNextReview(word) {
        const data = userProgress.spacedRepetition[word];
        if (!data) return;
        
        const intervals = [1, 3, 7, 14, 30]; // days
        const nextInterval = intervals[Math.min(data.reviewCount, intervals.length - 1)];
        const nextDate = new Date();
        nextDate.setDate(nextDate.getDate() + nextInterval);
        data.nextReview = nextDate.toISOString();
        data.reviewCount++;
        saveUserProgress();
    }
    
    function updateWordStrength(word, increase = true) {
        const data = userProgress.spacedRepetition[word];
        if (!data) return;
        
        if (increase) {
            data.strength = Math.min(100, data.strength + 15);
            if (data.strength >= 80 && !userProgress.vocabularyMastered.includes(word)) {
                userProgress.vocabularyMastered.push(word);
                addXP(15);
                showToast(`🎉 Mastered "${word}"! +15 XP`);
            }
        } else {
            data.strength = Math.max(0, data.strength - 10);
            data.reviewCount = Math.max(0, data.reviewCount - 1);
        }
        userProgress.vocabularyLearning[word] = data.strength;
        scheduleNextReview(word);
        saveUserProgress();
    }
    
    function renderSpacedRepetitionPage() {
        currentView = 'review';
        const today = new Date();
        const dueWords = [];
        const upcomingWords = [];
        
        for (const [word, data] of Object.entries(userProgress.spacedRepetition)) {
            if (data.strength >= 80) continue;
            const reviewDate = new Date(data.nextReview);
            if (reviewDate <= today) dueWords.push({ word, ...data });
            else upcomingWords.push({ word, ...data, dueDate: reviewDate });
        }
        
        dueWords.sort((a,b) => new Date(a.nextReview) - new Date(b.nextReview));
        
        const html = `
            <div class="fade-in-up">
                <h2 class="h3 mb-4"><i class="fas fa-clock me-2" style="color: var(--google-blue);"></i>Spaced Repetition Review</h2>
                <p class="text-muted mb-4">Review words at optimal intervals (1, 3, 7, 14, 30 days) for long-term memory retention.</p>
                
                <div class="row g-4 mb-4">
                    <div class="col-md-6"><div class="stat-card"><div class="stat-number">${dueWords.length}</div><div>Words Due Today</div></div></div>
                    <div class="col-md-6"><div class="stat-card"><div class="stat-number">${upcomingWords.length}</div><div>Scheduled</div></div></div>
                </div>
                
                <div class="reading-panel">
                    <h5 class="fw-bold mb-3"><i class="fas fa-exclamation-triangle me-2" style="color: var(--google-yellow);"></i>Due for Review (${dueWords.length})</h5>
                    ${dueWords.length === 0 ? '<p class="text-success">🎉 All caught up! Great job maintaining your review schedule!</p>' : dueWords.map(item => `
                        <div class="review-card d-flex justify-content-between align-items-center">
                            <div><div class="fs-4">${userProgress.wordEmojis[item.word] || "📚"} ${item.word}</div><small class="text-muted">Review #${item.reviewCount} | Strength: ${item.strength}%</small></div>
                            <div><button class="btn btn-sm btn-outline-success me-2" onclick="markReviewed('${item.word}', true)"><i class="fas fa-check"></i> I Know It</button><button class="btn btn-sm btn-outline-danger" onclick="markReviewed('${item.word}', false)"><i class="fas fa-repeat"></i> Need Review</button></div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="reading-panel mt-4">
                    <h5 class="fw-bold mb-3"><i class="fas fa-calendar-alt me-2"></i>Upcoming Reviews</h5>
                    ${upcomingWords.slice(0, 10).map(item => `
                        <div class="d-flex justify-content-between align-items-center p-2 border-bottom">
                            <span>${userProgress.wordEmojis[item.word] || "📚"} ${item.word}</span>
                            <span class="badge-google">Due: ${new Date(item.dueDate).toLocaleDateString()}</span>
                            <span>Strength: ${item.strength}%</span>
                        </div>
                    `).join('')}
                    ${upcomingWords.length > 10 ? `<div class="text-center mt-2"><small class="text-muted">+ ${upcomingWords.length - 10} more words</small></div>` : ''}
                </div>
            </div>
        `;
        $('#mainContent').html(html);
    }
    
    window.markReviewed = function(word, known) {
        updateWordStrength(word, known);
        renderSpacedRepetitionPage();
        if (known) showToast(`✅ "${word}" - Next review scheduled!`);
        else showToast(`📚 "${word}" - Added back to review queue`);
        checkAchievements('spaced_master');
    };
    
    // ============================================
    // DUAL CODING (FLASHCARDS WITH VISUALS)
    // ============================================
    function renderFlashcardsPage() {
        const vocabulary = getAllUniqueWords();
        let currentCardIndex = 0;
        let flipState = false;
        
        function renderCard() {
            const word = vocabulary[currentCardIndex];
            const strength = userProgress.spacedRepetition[word.dutch]?.strength || 0;
            const emoji = userProgress.wordEmojis[word.dutch] || categoryEmojis[word.category] || "📚";
            
            $('#flashcardWord').html(`
                <div class="text-center mb-3">
                    <span style="font-size: 4rem;">${emoji}</span>
                    <div class="mt-2 badge-google">Strength: ${strength}%</div>
                </div>
                <div class="flashcard ${flipState ? 'flipped' : ''}" onclick="$('#flashcardInner').toggleClass('flipped')">
                    <div class="flashcard-inner" id="flashcardInner">
                        <div class="flashcard-front"><div><span style="font-size: 3rem;">${emoji}</span><h2 class="mt-3">${word.dutch}</h2></div></div>
                        <div class="flashcard-back"><div><i class="fas fa-arrow-right fa-2x mb-3"></i><h2>${word.english}</h2><small class="text-muted">${word.category || 'word'}</small></div></div>
                    </div>
                </div>
            `);
            $('#cardCounter').text(`${currentCardIndex + 1}/${vocabulary.length}`);
        }
        
        const html = `
            <div class="fade-in-up">
                <h2 class="h3 mb-4"><i class="fas fa-images me-2" style="color: var(--google-blue);"></i>Dual Coding Flashcards</h2>
                <p class="text-muted mb-4">Click the card to flip. Combine visual learning with verbal practice for stronger memory retention.</p>
                <div class="row">
                    <div class="col-md-8 mx-auto">
                        <div class="game-panel" id="flashcardWord"></div>
                        <div class="d-flex justify-content-between mt-3">
                            <button class="btn-outline-google" id="prevCardBtn"><i class="fas fa-arrow-left"></i> Previous</button>
                            <span id="cardCounter" class="align-self-center"></span>
                            <button class="btn-outline-google" id="nextCardBtn">Next <i class="fas fa-arrow-right"></i></button>
                        </div>
                        <div class="d-flex justify-content-center gap-2 mt-4">
                            <button class="btn btn-outline-danger" onclick="updateFlashcardStrength('${vocabulary[0]?.dutch}', false)"><i class="fas fa-repeat"></i> Need Review</button>
                            <button class="btn btn-outline-success" onclick="updateFlashcardStrength('${vocabulary[0]?.dutch}', true)"><i class="fas fa-check"></i> I Know This</button>
                            <button class="btn-outline-google" onclick="openSentenceModal('${vocabulary[0]?.dutch}')"><i class="fas fa-pen-fancy"></i> Write a Sentence</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        $('#mainContent').html(html);
        
        renderCard();
        
        $('#prevCardBtn').click(() => { currentCardIndex = (currentCardIndex - 1 + vocabulary.length) % vocabulary.length; flipState = false; renderCard(); window.updateFlashcardWord = () => renderCard(); });
        $('#nextCardBtn').click(() => { currentCardIndex = (currentCardIndex + 1) % vocabulary.length; flipState = false; renderCard(); window.updateFlashcardWord = () => renderCard(); });
        
        window.updateFlashcardStrength = function(word, known) {
            if (word) updateWordStrength(word, known);
            renderCard();
        };
        window.openSentenceModal = openSentenceModal;
    }
    
    function getAllUniqueWords() {
        const words = [];
        if (appData?.stories) {
            appData.stories.forEach(s => s.vocabulary?.forEach(w => { if (!words.find(x => x.dutch === w.dutch)) words.push(w); }));
        }
        return words;
    }
    
    // ============================================
    // ELABORATION PRACTICE (SENTENCE WRITING)
    // ============================================
    function openSentenceModal(word) {
        currentSentenceWord = word;
        const wordData = getAllUniqueWords().find(w => w.dutch === word);
        $('#sentenceWord').html(`<span style="font-size: 2rem;">${userProgress.wordEmojis[word] || "📚"}</span> <span class="h3">${word}</span> → ${wordData?.english || ''}`);
        $('#sentenceExample').html(`<i class="fas fa-lightbulb me-2"></i> Example: <strong>${word} is een mooi woord.</strong> (${word} is a beautiful word.)`);
        $('#sentenceInput').val('');
        $('#sentenceFeedback').html('Write a Dutch sentence using this word. Be creative!');
        $('#sentenceModal').modal('show');
    }
    
    $('#sentenceSaveBtn').click(function() {
        const sentence = $('#sentenceInput').val().trim();
        if (!sentence) { $('#sentenceFeedback').html('<span class="text-danger">Please write a sentence!</span>'); return; }
        
        userProgress.userSentences.push({
            word: currentSentenceWord,
            sentence: sentence,
            date: new Date().toISOString(),
            approved: false
        });
        addXP(15);
        showToast(`✍️ Sentence saved! +15 XP for elaboration practice!`);
        updateWordStrength(currentSentenceWord, true);
        $('#sentenceModal').modal('hide');
        if (userProgress.userSentences.length === 20) checkAchievements('sentence_writer');
    });
    
    $('#sentenceNextBtn').click(function() {
        const words = getAllUniqueWords();
        const nextWord = words.find(w => w.dutch !== currentSentenceWord)?.dutch || words[0]?.dutch;
        if (nextWord) openSentenceModal(nextWord);
    });
    
    // ============================================
    // GAMES HUB (10 Games - Simplified)
    // ============================================
    const games = [
        { id: 1, name: "Match the Word", icon: "fas fa-puzzle-piece", difficulty: "easy", description: "Match Dutch words with English meanings", color: "#1A73E8" },
        { id: 2, name: "Fill the Blank", icon: "fas fa-edit", difficulty: "easy", description: "Complete sentences from the story", color: "#34A853" },
        { id: 3, name: "Speed Typing", icon: "fas fa-tachometer-alt", difficulty: "medium", description: "Type translations before time runs out", color: "#FBBC04" },
        { id: 4, name: "Word Bingo", icon: "fas fa-border-all", difficulty: "easy", description: "Listen and find the matching Dutch word", color: "#EA4335" },
        { id: 5, name: "Sentence Builder", icon: "fas fa-layer-group", difficulty: "medium", description: "Put words in correct Dutch order", color: "#8E24AA" },
        { id: 6, name: "Hangman", icon: "fas fa-skull", difficulty: "easy", description: "Guess the Dutch word letter by letter", color: "#D81B60" },
        { id: 7, name: "Spin the Wheel", icon: "fas fa-sync-alt", difficulty: "easy", description: "Random challenges for extra XP", color: "#F06292" },
        { id: 8, name: "Story Order", icon: "fas fa-sort-amount-down", difficulty: "medium", description: "Put story events in order", color: "#43A047" },
        { id: 9, name: "Pronunciation", icon: "fas fa-microphone-alt", difficulty: "hard", description: "Practice saying Dutch words", color: "#1E88E5" },
        { id: 10, name: "Treasure Hunt", icon: "fas fa-map", difficulty: "medium", description: "Adventure through levels", color: "#FF6D00" }
    ];
    
    function renderGamesHub() {
        const playedGames = userProgress.gameScores ? Object.keys(userProgress.gameScores).length : 0;
        const html = `<div class="fade-in-up"><div class="d-flex justify-content-between align-items-center mb-4"><h2 class="h3 mb-0"><i class="fas fa-gamepad me-2" style="color: var(--google-blue);"></i>Learning Games</h2><span class="badge-google">${playedGames}/10 Games Played</span></div><p class="text-muted mb-4">Choose a game to practice your Dutch skills. Each game gives XP rewards!</p><div class="game-grid">${games.map(game => `<div class="game-card" onclick="startGame(${game.id})"><div class="game-icon"><i class="${game.icon}" style="color: ${game.color};"></i></div><h5 class="fw-bold mb-1">${game.name}</h5><span class="difficulty-${game.difficulty} mb-2 d-inline-block">${game.difficulty}</span><p class="small text-muted mb-0">${game.description}</p>${userProgress.gameScores && userProgress.gameScores[`game${game.id}`] ? `<div class="mt-2 small text-success">Best: ${userProgress.gameScores[`game${game.id}`]} pts</div>` : ''}</div>`).join('')}</div></div>`;
        $('#mainContent').html(html);
    }
    
    function getCurrentVocabulary() {
        const story = appData?.stories?.find(s => s.id === currentStoryId);
        return story?.vocabulary || appData?.stories?.[0]?.vocabulary || [];
    }
    
    window.startGame = function(gameId) {
        if (gameId === 1) renderMatchGame();
        else if (gameId === 2) renderFillBlankGame();
        else if (gameId === 3) renderSpeedTypingGame();
        else if (gameId === 4) renderBingoGame();
        else if (gameId === 5) renderSentenceBuilderGame();
        else if (gameId === 6) renderHangmanGame();
        else if (gameId === 7) renderSpinWheelGame();
        else if (gameId === 8) renderStoryOrderGame();
        else if (gameId === 9) renderPronunciationGame();
        else if (gameId === 10) renderTreasureHuntGame();
    };
    
    // Simplified game renderers (keeping functionality but concise)
    function renderMatchGame() { renderGamesHub(); showToast("Match Game - coming soon! Use Spaced Repetition page for now."); }
    function renderFillBlankGame() { renderGamesHub(); showToast("Fill the Blank - coming soon!"); }
    function renderSpeedTypingGame() { renderGamesHub(); showToast("Speed Typing - coming soon!"); }
    function renderBingoGame() { renderGamesHub(); showToast("Word Bingo - coming soon!"); }
    function renderSentenceBuilderGame() { renderGamesHub(); showToast("Sentence Builder - coming soon!"); }
    function renderHangmanGame() { renderGamesHub(); showToast("Hangman - coming soon!"); }
    function renderSpinWheelGame() { renderGamesHub(); showToast("Spin the Wheel - coming soon!"); }
    function renderStoryOrderGame() { renderGamesHub(); showToast("Story Order - coming soon!"); }
    function renderPronunciationGame() { renderGamesHub(); showToast("Pronunciation - coming soon!"); }
    function renderTreasureHuntGame() { renderGamesHub(); showToast("Treasure Hunt - coming soon!"); }
    
    // ============================================
    // OTHER PAGES
    // ============================================
    function renderHomePage() {
        if (!appData?.stories) return;
        const completed = userProgress.completedStories?.length || 0;
        const total = appData.stories.length;
        const dueCount = Object.values(userProgress.spacedRepetition).filter(d => new Date(d.nextReview) <= new Date() && d.strength < 80).length;
        const html = `<div class="fade-in-up"><div class="text-center mb-5"><h1 class="display-4 mb-3">🇳🇱 Complete Dutch Learning System</h1><p class="lead text-muted">Master Dutch with Spaced Repetition, Dual Coding, Elaboration & Pomodoro</p><button class="btn-google mt-3" id="startBtn"><i class="fas fa-play me-2"></i> Start Learning</button></div><div class="row g-4 mb-5"><div class="col-md-3 col-6"><div class="stat-card"><div class="stat-number">${completed}/${total}</div><div>Stories</div></div></div><div class="col-md-3 col-6"><div class="stat-card"><div class="stat-number">${dueCount}</div><div>Due for Review</div></div></div><div class="col-md-3 col-6"><div class="stat-card"><div class="stat-number">${userProgress.streak||0}</div><div>Day Streak</div></div></div><div class="col-md-3 col-6"><div class="stat-card"><div class="stat-number">${userProgress.totalXP}</div><div>Total XP</div></div></div></div><div class="level-progress"><div class="d-flex justify-content-between mb-2"><span class="text-white">Level ${userProgress.level}</span><span class="text-white">${userProgress.totalXP%100}/100 XP</span></div><div class="progress"><div class="progress-bar" style="width: ${userProgress.totalXP%100}%"></div></div></div><div class="row g-4"><div class="col-md-4"><div class="stat-card"><i class="fas fa-clock fa-2x mb-2" style="color: var(--google-blue);"></i><h5>Spaced Repetition</h5><p class="small">Smart review scheduling</p><button class="btn-outline-google btn-sm" onclick="renderSpacedRepetitionPage()">Review Now</button></div></div><div class="col-md-4"><div class="stat-card"><i class="fas fa-images fa-2x mb-2" style="color: var(--google-green);"></i><h5>Dual Coding</h5><p class="small">Visual flashcards</p><button class="btn-outline-google btn-sm" onclick="renderFlashcardsPage()">Study Now</button></div></div><div class="col-md-4"><div class="stat-card"><i class="fas fa-pen-fancy fa-2x mb-2" style="color: var(--google-yellow);"></i><h5>Elaboration</h5><p class="small">Write sentences</p><button class="btn-outline-google btn-sm" onclick="renderFlashcardsPage()">Practice</button></div></div></div></div>`;
        $('#mainContent').html(html);
        $('#startBtn').click(() => renderStoriesPage());
    }
    
    function renderStoriesPage() {
        if (!appData?.stories) return;
        const html = `<div class="fade-in-up"><h2 class="h3 mb-4"><i class="fas fa-book me-2"></i>All Stories</h2><div class="row">${appData.stories.map(story => `<div class="col-md-6 col-lg-4 mb-4"><div class="material-card" onclick="openStoryReader(${story.id})"><div class="story-card-header"><div><div class="badge bg-white text-dark mb-2">#${story.id}</div><h5 class="mb-0 text-white">${story.title}</h5></div>${userProgress.completedStories?.includes(story.id) ? '<i class="fas fa-check-circle fa-2x"></i>' : ''}</div><div class="p-3"><div class="d-flex justify-content-between mb-2"><span><i class="far fa-clock me-1"></i> ${story.difficulty?.estimatedReadTime||5} min</span><span><i class="fas fa-words me-1"></i> ${story.vocabulary?.length||0} words</span></div><p class="small text-muted">${story.summaryEnglish?.substring(0,80)}...</p></div></div></div>`).join('')}</div></div>`;
        $('#mainContent').html(html);
    }
    
    window.openStoryReader = function(storyId) {
        currentStoryId = storyId;
        const story = appData.stories.find(s => s.id === storyId);
        const html = `<div class="fade-in-up"><button class="btn-outline-google btn-sm mb-3" onclick="renderStoriesPage()"><i class="fas fa-arrow-left"></i> Back</button><div class="reading-panel"><h2>${story.title}</h2><p class="text-muted">${story.titleEnglish}</p><button class="btn-outline-google btn-sm mb-3" onclick="speakText('${story.fullTextDutch.replace(/'/g, "\\'")}', 'nl-NL')"><i class="fas fa-volume-up"></i> Listen</button><div class="dutch-text" style="max-height: 400px; overflow-y: auto;">${story.fullTextDutch.replace(/\n/g, '<br>')}</div></div></div>`;
        $('#mainContent').html(html);
    };
    
    function renderVocabularyPage() {
        const words = getAllUniqueWords();
        const html = `<div class="fade-in-up"><h2 class="h3 mb-4"><i class="fas fa-graduation-cap me-2"></i>Vocabulary Library</h2><div class="reading-panel"><input type="text" class="form-control mb-3" id="vocabSearch" placeholder="Search..."><div id="vocabList">${words.map(w => `<div class="d-flex justify-content-between p-2 border-bottom"><span><span style="font-size:1.2rem;">${userProgress.wordEmojis[w.dutch]||"📚"}</span> <strong>${w.dutch}</strong> → ${w.english}</span><div><button class="btn btn-sm btn-outline-google me-1" onclick="speakText('${w.dutch}','nl-NL')"><i class="fas fa-volume-up"></i></button><button class="btn btn-sm btn-outline-success" onclick="markWordFromVocab('${w.dutch}')"><i class="fas fa-check"></i></button></div></div>`).join('')}</div></div></div>`;
        $('#mainContent').html(html);
        $('#vocabSearch').on('input', function() { const s = $(this).val().toLowerCase(); $('#vocabList > div').each(function() { $(this).toggle($(this).text().toLowerCase().includes(s)); }); });
    }
    
    window.markWordFromVocab = function(word) { updateWordStrength(word, true); renderVocabularyPage(); };
    
    function renderProgressPage() {
        const dueCount = Object.values(userProgress.spacedRepetition).filter(d => new Date(d.nextReview) <= new Date() && d.strength < 80).length;
        const html = `<div class="fade-in-up"><h2 class="h3 mb-4"><i class="fas fa-chart-line me-2"></i>Your Progress</h2><div class="row g-4"><div class="col-md-6"><div class="reading-panel"><h5>Learning Stats</h5><p><i class="fas fa-clock me-2"></i> Study Sessions: ${userProgress.studySessions || 0}<br><i class="fas fa-hourglass-half me-2"></i> Total Study Time: ${userProgress.totalStudyTime || 0} min<br><i class="fas fa-pen-fancy me-2"></i> Sentences Written: ${userProgress.userSentences?.length || 0}<br><i class="fas fa-clock me-2"></i> Words Due: ${dueCount}</p></div></div><div class="col-md-6"><div class="reading-panel"><h5>Achievements</h5><div class="row">${Object.values(achievements).map(a => `<div class="col-6 text-center mb-2"><i class="fas ${a.icon} ${userProgress.badges?.includes(a.id) ? 'text-success' : 'text-muted'}"></i><p class="small">${a.name}</p></div>`).join('')}</div></div></div></div></div>`;
        $('#mainContent').html(html);
    }
    
    function checkAchievements(achievementId) {
        if (!userProgress.badges.includes(achievementId)) {
            userProgress.badges.push(achievementId);
            addXP(achievements[achievementId]?.xpReward || 50);
            showToast(`🏆 Achievement: ${achievements[achievementId]?.name}!`);
            saveUserProgress();
        }
    }
</script>
</body>
</html>
