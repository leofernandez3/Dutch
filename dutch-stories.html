<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dutch Stories | Learn Dutch Through Reading</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --google-blue: #1A73E8;
            --google-red: #EA4335;
            --google-yellow: #FBBC04;
            --google-green: #34A853;
            --google-gray-900: #202124;
            --google-gray-800: #3C4043;
            --google-gray-700: #5F6368;
            --google-gray-200: #E8EAED;
            --google-gray-100: #F1F3F4;
            --google-white: #FFFFFF;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 24px;
            --transition-fast: 0.2s ease;
            --transition-normal: 0.3s ease;
        }

        body {
            font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--google-gray-100) 0%, var(--google-white) 100%);
            color: var(--google-gray-900);
            line-height: 1.5;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--google-gray-200);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--google-blue) 0%, var(--google-green) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-link {
            color: var(--google-gray-700) !important;
            font-weight: 500;
            transition: var(--transition-fast);
            position: relative;
        }

        .nav-link:hover {
            color: var(--google-blue) !important;
        }

        .material-card {
            background: var(--google-white);
            border-radius: var(--radius-lg);
            box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 2px 6px 2px rgba(60, 64, 67, 0.15);
            transition: var(--transition-normal);
            overflow: hidden;
            cursor: pointer;
            height: 100%;
        }

        .material-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 8px 0 rgba(60, 64, 67, 0.3), 0 6px 12px 4px rgba(60, 64, 67, 0.15);
        }

        .game-card {
            background: linear-gradient(135deg, var(--google-white) 0%, var(--google-gray-100) 100%);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition-normal);
            height: 100%;
            border: 1px solid var(--google-gray-200);
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .story-card-header {
            background: linear-gradient(135deg, var(--google-blue) 0%, var(--google-green) 100%);
            padding: 1.5rem;
            color: var(--google-white);
            position: relative;
            overflow: hidden;
        }

        .stat-card {
            background: var(--google-white);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3);
            transition: var(--transition-normal);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--google-blue);
        }

        .btn-google {
            background: var(--google-blue);
            color: var(--google-white);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 500;
            transition: var(--transition-fast);
        }

        .btn-google:hover {
            background: #1557b0;
        }

        .btn-outline-google {
            background: transparent;
            color: var(--google-blue);
            border: 2px solid var(--google-blue);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 500;
            transition: var(--transition-fast);
        }

        .btn-outline-google:hover {
            background: var(--google-blue);
            color: var(--google-white);
        }

        .reading-panel {
            background: var(--google-white);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3);
            margin-bottom: 2rem;
        }

        .game-panel {
            background: var(--google-white);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3);
        }

        .dutch-text {
            font-size: 1.1rem;
            line-height: 1.8;
            font-family: 'Roboto Mono', monospace;
        }

        .quiz-option {
            background: var(--google-gray-100);
            border-radius: var(--radius-md);
            padding: 1rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: var(--transition-fast);
            border: 2px solid transparent;
        }

        .quiz-option:hover {
            background: var(--google-gray-200);
        }

        .quiz-option.selected {
            border-color: var(--google-blue);
            background: rgba(26, 115, 232, 0.1);
        }

        .quiz-option.correct {
            background: rgba(52, 168, 83, 0.15);
            border-color: var(--google-green);
        }

        .quiz-option.wrong {
            background: rgba(234, 67, 53, 0.1);
            border-color: var(--google-red);
        }

        .badge-google {
            background: linear-gradient(135deg, var(--google-blue), var(--google-green));
            color: var(--google-white);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: 500;
        }

        .progress {
            height: 8px;
            border-radius: 10px;
            background: var(--google-gray-200);
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--google-blue), var(--google-green));
            border-radius: 10px;
        }

        .level-progress {
            background: linear-gradient(135deg, var(--google-yellow), var(--google-red));
            border-radius: var(--radius-lg);
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .toast-google {
            background: var(--google-gray-900);
            color: var(--google-white);
            border-radius: var(--radius-md);
            padding: 1rem 1.5rem;
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1100;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }

        .toast-google.show {
            transform: translateX(0);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .game-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .game-difficulty {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            display: inline-block;
        }

        .difficulty-easy { background: #34A853; color: white; }
        .difficulty-medium { background: #FBBC04; color: #202124; }
        .difficulty-hard { background: #EA4335; color: white; }

        .match-card {
            background: var(--google-gray-100);
            border-radius: var(--radius-md);
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition-fast);
            min-width: 100px;
        }

        .match-card.selected {
            background: var(--google-blue);
            color: white;
        }

        .match-card.matched {
            background: var(--google-green);
            color: white;
            opacity: 0.6;
            cursor: default;
        }

        .word-tile {
            background: var(--google-blue);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            margin: 0.25rem;
            display: inline-block;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .word-tile:hover {
            transform: scale(1.05);
        }

        .sentence-builder-area {
            min-height: 80px;
            background: var(--google-gray-100);
            border-radius: var(--radius-md);
            padding: 1rem;
            margin: 1rem 0;
        }

        @media (max-width: 768px) {
            .reading-panel, .game-panel { padding: 1rem; }
            .game-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in-up { animation: fadeInUp 0.5s ease forwards; }

        .spinner-google {
            width: 40px;
            height: 40px;
            border: 3px solid var(--google-gray-200);
            border-top-color: var(--google-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .vocab-word {
            background: linear-gradient(120deg, rgba(251, 188, 4, 0.2) 0%, rgba(251, 188, 4, 0.2) 100%);
            cursor: pointer;
            padding: 0 2px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<!-- Navigation -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#" id="homeLink">
            <i class="fas fa-book-open me-2"></i>Dutch<span style="color: var(--google-blue);">Stories</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="#" id="navHome"><i class="fas fa-home me-1"></i> Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="navStories"><i class="fas fa-book me-1"></i> Stories</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="navVocabulary"><i class="fas fa-graduation-cap me-1"></i> Words</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="navGames"><i class="fas fa-gamepad me-1"></i> Games</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="navProgress"><i class="fas fa-chart-line me-1"></i> Progress</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="navStrategies"><i class="fas fa-lightbulb me-1"></i> Strategies</a></li>
            </ul>
            <div class="ms-3 d-flex gap-2">
                <span class="badge-google" id="levelBadge"><i class="fas fa-star me-1"></i> Level 1</span>
                <span class="badge-google" id="streakBadge"><i class="fas fa-fire me-1"></i> <span id="streakCount">0</span> days</span>
            </div>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="container py-4" id="mainContent">
    <div class="text-center py-5" id="loadingDiv">
        <div class="spinner-google mx-auto mb-3"></div>
        <p class="text-muted">Loading your Dutch stories...</p>
    </div>
</main>

<div id="toastContainer" style="position: fixed; bottom: 20px; right: 20px; z-index: 1090;"></div>

<script>
    // ============================================
    // APP STATE
    // ============================================
    let appData = null;
    let currentView = 'home';
    let currentStoryId = 1;
    let currentGameWords = [];
    
    // Game state variables
    let matchGameSelected = null;
    let matchGameMatches = [];
    let hangmanWord = '';
    let hangmanGuessed = [];
    let hangmanWrong = 0;
    let speedTypingCurrentWord = null;
    let speedTypingScore = 0;
    let speedTypingTimer = null;
    let bingoBoard = [];
    let bingoMarked = [];
    let sentenceBuilderWords = [];
    let sentenceBuilderCurrent = [];
    let wheelSpinning = false;
    let treasureMapLevel = 1;
    let storyOrderEvents = [];
    
    // ============================================
    // USER PROGRESS
    // ============================================
    let userProgress = {
        totalXP: 0, level: 1, streak: 0, lastLoginDate: null,
        completedStories: [], storyStars: {}, storyQuizScores: {},
        vocabularyLearning: {}, vocabularyMastered: [], wordReviewQueue: [],
        badges: [], quizzesTaken: 0, correctAnswers: 0,
        gameScores: {}
    };
    
    const achievements = {
        first_story: { id: 'first_story', name: 'First Steps', description: 'Complete your first story', icon: 'fa-book', xpReward: 50 },
        five_stories: { id: 'five_stories', name: 'Story Explorer', description: 'Complete 5 stories', icon: 'fa-layer-group', xpReward: 100 },
        ten_stories: { id: 'ten_stories', name: 'Master Storyteller', description: 'Complete 10 stories', icon: 'fa-crown', xpReward: 200 },
        seven_day_streak: { id: 'seven_day_streak', name: 'On Fire!', description: '7-day learning streak', icon: 'fa-fire', xpReward: 150 },
        game_master: { id: 'game_master', name: 'Game Master', description: 'Play all 10 games', icon: 'fa-gamepad', xpReward: 100 }
    };
    
    // ============================================
    // INITIALIZATION
    // ============================================
    $(document).ready(function() {
        loadUserProgress();
        setupEventListeners();
        loadData();
    });
    
    function loadData() {
        $.getJSON('dutch-stories.json')
            .done(function(data) {
                appData = data;
                $('#loadingDiv').hide();
                if (!userProgress.vocabularyLearning) userProgress.vocabularyLearning = {};
                if (appData.stories) {
                    appData.stories.forEach(story => {
                        if (story.vocabulary) {
                            story.vocabulary.forEach(word => {
                                if (userProgress.vocabularyLearning[word.dutch] === undefined)
                                    userProgress.vocabularyLearning[word.dutch] = 0;
                            });
                        }
                    });
                }
                saveUserProgress();
                renderHomePage();
            })
            .fail(function() {
                $('#loadingDiv').html(`<div class="alert alert-danger">Could not load dutch-stories.json. Make sure the file exists.</div>`);
            });
    }
    
    function loadUserProgress() {
        const saved = localStorage.getItem('dutch_learner_progress');
        if (saved) Object.assign(userProgress, JSON.parse(saved));
        const today = new Date().toDateString();
        if (userProgress.lastLoginDate !== today) {
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            userProgress.streak = userProgress.lastLoginDate === yesterday.toDateString() ? (userProgress.streak || 0) + 1 : 1;
            userProgress.lastLoginDate = today;
            saveUserProgress();
        }
        updateLevelDisplay();
    }
    
    function saveUserProgress() { localStorage.setItem('dutch_learner_progress', JSON.stringify(userProgress)); }
    function updateLevelDisplay() {
        userProgress.level = Math.floor(userProgress.totalXP / 100) + 1;
        $('#levelBadge').html(`<i class="fas fa-star me-1"></i> Level ${userProgress.level}`);
        $('#streakCount').text(userProgress.streak || 0);
    }
    function addXP(amount) { userProgress.totalXP += amount; updateLevelDisplay(); saveUserProgress(); showToast(`+${amount} XP`); }
    function showToast(msg) {
        const toast = $(`<div class="toast-google show">${msg}</div>`);
        $('#toastContainer').append(toast);
        setTimeout(() => { toast.removeClass('show'); setTimeout(() => toast.remove(), 300); }, 3000);
    }
    
    window.speakText = function(text, lang = 'nl-NL') {
        if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang; utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
    };
    
    function setupEventListeners() {
        $('#homeLink, #navHome').click(e => { e.preventDefault(); renderHomePage(); });
        $('#navStories').click(e => { e.preventDefault(); renderStoriesPage(); });
        $('#navVocabulary').click(e => { e.preventDefault(); renderVocabularyPage(); });
        $('#navGames').click(e => { e.preventDefault(); renderGamesHub(); });
        $('#navProgress').click(e => { e.preventDefault(); renderProgressPage(); });
        $('#navStrategies').click(e => { e.preventDefault(); renderStrategiesPage(); });
    }
    
    // ============================================
    // GAMES HUB
    // ============================================
    const games = [
        { id: 1, name: "Match the Word", icon: "fas fa-puzzle-piece", difficulty: "easy", description: "Match Dutch words with their English meanings", color: "#1A73E8" },
        { id: 2, name: "Fill the Blank", icon: "fas fa-edit", difficulty: "easy", description: "Complete sentences from the story", color: "#34A853" },
        { id: 3, name: "Speed Typing", icon: "fas fa-tachometer-alt", difficulty: "medium", description: "Type translations before time runs out", color: "#FBBC04" },
        { id: 4, name: "Word Bingo", icon: "fas fa-border-all", difficulty: "easy", description: "Listen and find the matching Dutch word", color: "#EA4335" },
        { id: 5, name: "Sentence Builder", icon: "fas fa-layer-group", difficulty: "medium", description: "Put words in correct Dutch order", color: "#8E24AA" },
        { id: 6, name: "Hangman", icon: "fas fa-skull", difficulty: "easy", description: "Guess the Dutch word letter by letter", color: "#D81B60" },
        { id: 7, name: "Spin the Wheel", icon: "fas fa-sync-alt", difficulty: "easy", description: "Random challenges for extra XP", color: "#F06292" },
        { id: 8, name: "Story Order", icon: "fas fa-sort-amount-down", difficulty: "medium", description: "Put story events in chronological order", color: "#43A047" },
        { id: 9, name: "Pronunciation", icon: "fas fa-microphone-alt", difficulty: "hard", description: "Practice saying Dutch words", color: "#1E88E5" },
        { id: 10, name: "Treasure Hunt", icon: "fas fa-map", difficulty: "medium", description: "Adventure through levels", color: "#FF6D00" }
    ];
    
    function renderGamesHub() {
        currentView = 'games';
        const playedGames = userProgress.gameScores ? Object.keys(userProgress.gameScores).length : 0;
        const html = `
            <div class="fade-in-up">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="h3 mb-0"><i class="fas fa-gamepad me-2" style="color: var(--google-blue);"></i>Learning Games</h2>
                    <span class="badge-google">${playedGames}/10 Games Played</span>
                </div>
                <p class="text-muted mb-4">Choose a game to practice your Dutch skills. Each game gives XP rewards!</p>
                <div class="game-grid">
                    ${games.map(game => `
                        <div class="game-card" onclick="startGame(${game.id})">
                            <div class="game-icon"><i class="${game.icon}" style="color: ${game.color};"></i></div>
                            <h5 class="fw-bold mb-1">${game.name}</h5>
                            <span class="game-difficulty difficulty-${game.difficulty} mb-2 d-inline-block">${game.difficulty}</span>
                            <p class="small text-muted mb-0">${game.description}</p>
                            ${userProgress.gameScores && userProgress.gameScores[`game${game.id}`] ? `<div class="mt-2 small text-success"><i class="fas fa-check-circle"></i> Best: ${userProgress.gameScores[`game${game.id}`]} pts</div>` : ''}
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
        $('#mainContent').html(html);
    }
    
    // Get current story vocabulary for games
    function getCurrentVocabulary() {
        const story = appData?.stories?.find(s => s.id === currentStoryId);
        if (story && story.vocabulary) return story.vocabulary;
        return appData?.stories?.[0]?.vocabulary || [];
    }
    
    // ============================================
    // GAME 1: MATCH THE WORD
    // ============================================
    window.startGame = function(gameId) {
        const vocabulary = getCurrentVocabulary();
        if (vocabulary.length < 4) { showToast("Need at least 4 words for this game!"); return; }
        
        if (gameId === 1) {
            const words = vocabulary.slice(0, 8);
            const dutchWords = words.map(w => w.dutch);
            const englishWords = words.map(w => w.english);
            const shuffledEnglish = [...englishWords].sort(() => Math.random() - 0.5);
            matchGameMatches = [];
            matchGameSelected = null;
            
            const html = `
                <div class="fade-in-up">
                    <button class="btn-outline-google btn-sm mb-3" onclick="renderGamesHub()"><i class="fas fa-arrow-left me-1"></i> Back to Games</button>
                    <div class="game-panel">
                        <h3 class="h4 mb-3"><i class="fas fa-puzzle-piece me-2"></i>Match the Word</h3>
                        <p class="text-muted">Click on a Dutch word, then click on its English meaning.</p>
                        <div id="matchGameScore" class="mb-3">Matches: 0/${words.length}</div>
                        <div class="row">
                            <div class="col-md-6">
                                <h5>Dutch Words</h5>
                                <div id="dutchColumn" class="d-flex flex-wrap gap-2">
                                    ${dutchWords.map(word => `<div class="match-card" data-type="dutch" data-value="${word}" data-matched="false">${word}</div>`).join('')}
                                </div>
                            </div>
                            <div class="col-md-6">
                                <h5>English Meanings</h5>
                                <div id="englishColumn" class="d-flex flex-wrap gap-2">
                                    ${shuffledEnglish.map((eng, idx) => `<div class="match-card" data-type="english" data-value="${eng}" data-original="${words.find(w=>w.english===eng)?.dutch}" data-matched="false">${eng}</div>`).join('')}
                                </div>
                            </div>
                        </div>
                        <div id="matchGameMessage" class="mt-3"></div>
                    </div>
                </div>
            `;
            $('#mainContent').html(html);
            
            let matches = 0;
            $('.match-card').click(function() {
                if ($(this).data('matched') === true) return;
                const type = $(this).data('type');
                const value = $(this).data('value');
                
                if (matchGameSelected === null) {
                    $('.match-card').removeClass('selected');
                    $(this).addClass('selected');
                    matchGameSelected = { type, value, element: this };
                } else {
                    const selected = matchGameSelected;
                    matchGameSelected = null;
                    $('.match-card').removeClass('selected');
                    
                    if ((selected.type === 'dutch' && type === 'english') || (selected.type === 'english' && type === 'dutch')) {
                        const dutchWord = selected.type === 'dutch' ? selected.value : value;
                        const englishWord = selected.type === 'english' ? selected.value : value;
                        const isMatch = vocabulary.some(w => w.dutch === dutchWord && w.english === englishWord);
                        
                        if (isMatch) {
                            matches++;
                            $(selected.element).data('matched', true).addClass('matched');
                            $(this).data('matched', true).addClass('matched');
                            $('#matchGameScore').text(`Matches: ${matches}/${words.length}`);
                            addXP(5);
                            if (matches === words.length) {
                                userProgress.gameScores = userProgress.gameScores || {};
                                userProgress.gameScores.game1 = words.length * 10;
                                saveUserProgress();

                    }
                }
            });
        }
        else if (gameId === 2) renderFillBlankGame();

        else if (gameId === 5) renderSentenceBuilderGame();
        else if (gameId === 6) renderHangmanGame();
        else if (gameId === 7) renderSpinWheelGame();
        else if (gameId === 8) renderStoryOrderGame();
        else if (gameId === 9) renderPronunciationGame();
        else if (gameId === 10) renderTreasureHuntGame();
    };

    // ============================================
    // GAME 4: WORD BINGO
    // ============================================
    function renderBingoGame() {
        const vocabulary = getCurrentVocabulary().slice(0, 16);
        bingoBoard = vocabulary.slice(0, 16);
        bingoMarked = new Array(16).fill(false);
        let bingoScore = 0;
        
        function checkBingo() {
            const rows = [0,1,2,3]; const cols = [0,1,2,3];
            for (let r of rows) { if (bingoMarked[r*4] && bingoMarked[r*4+1] && bingoMarked[r*4+2] && bingoMarked[r*4+3]) return true; }
            for (let c of cols) { if (bingoMarked[c] && bingoMarked[4+c] && bingoMarked[8+c] && bingoMarked[12+c]) return true; }
            if (bingoMarked[0] && bingoMarked[5] && bingoMarked[10] && bingoMarked[15]) return true;
            if (bingoMarked[3] && bingoMarked[6] && bingoMarked[9] && bingoMarked[12]) return true;
            return false;
        }
        
        function speakRandomWord() {
            const unmarked = bingoBoard.filter((_, idx) => !bingoMarked[idx]);
            if (unmarked.length === 0) return;
            const word = unmarked[Math.floor(Math.random() * unmarked.length)];
            speakText(word.dutch, 'nl-NL');
            return word;
        }
        
        function renderBoard() {
            let html = '<div class="row g-2">';
            bingoBoard.forEach((word, idx) => {
                html += `<div class="col-3"><div class="p-3 text-center border rounded-3 ${bingoMarked[idx] ? 'bg-success text-white' : 'bg-light'}" onclick="markBingo(${idx})">${word.dutch}</div></div>`;
            });
            html += '</div>';
            $('#bingoBoard').html(html);
        }
        
        window.markBingo = function(idx) {
            if (!bingoMarked[idx]) {
                bingoMarked[idx] = true;
                bingoScore += 10;
                renderBoard();
                if (checkBingo()) {
                    addXP(100);
                    showToast('🎉 BINGO! +100 XP!');
                    userProgress.gameScores = userProgress.gameScores || {};
                    userProgress.gameScores.game4 = Math.max(userProgress.gameScores.game4 || 0, bingoScore);
                    saveUserProgress();
                    setTimeout(() => renderGamesHub(), 2000);
                } else {
                    speakRandomWord();
                }
            }
        };
        
        const html = `
            <div class="fade-in-up"><button class="btn-outline-google btn-sm mb-3" onclick="renderGamesHub()"><i class="fas fa-arrow-left me-1"></i> Back to Games</button>
            <div class="game-panel"><h3 class="h4 mb-3"><i class="fas fa-border-all me-2"></i>Word Bingo</h3>
            <p>Listen to the Dutch word and click the matching tile!</p>
            <div id="bingoBoard"></div>
            <div class="mt-3"><button class="btn-outline-google btn-sm" onclick="speakRandomWordFromBingo()"><i class="fas fa-volume-up me-1"></i> Say a Word</button></div>
            </div></div>`;
        $('#mainContent').html(html);
        renderBoard();
        window.speakRandomWordFromBingo = () => speakRandomWord();
        setTimeout(() => speakRandomWord(), 1000);
    }

    // ============================================
    // GAME 6: HANGMAN
    // ============================================
    function renderHangmanGame() {
        const vocabulary = getCurrentVocabulary();
        hangmanWord = vocabulary[Math.floor(Math.random() * vocabulary.length)].dutch;
        hangmanGuessed = [];
        hangmanWrong = 0;
        
        function renderHangman() {
            const displayWord = hangmanWord.split('').map(l => hangmanGuessed.includes(l) ? l : '_').join(' ');
            const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
            const letters = alphabet.map(l => `<button class="btn btn-sm ${hangmanGuessed.includes(l) ? 'btn-secondary' : 'btn-outline-google'} m-1" onclick="guessLetter('${l}')" ${hangmanGuessed.includes(l) ? 'disabled' : ''}>${l}</button>`).join('');
            
            $('#hangmanWord').html(`<div class="display-4 mb-3">${displayWord}</div>`);
            $('#hangmanWrong').html(`<div class="mb-2">Wrong guesses: ${hangmanWrong}/6</div><div class="progress mb-3"><div class="progress-bar bg-danger" style="width: ${(hangmanWrong/6)*100}%"></div></div>`);
            $('#hangmanLetters').html(letters);
            
            if (displayWord.replace(/ /g, '') === hangmanWord) {
                addXP(50);
                showToast('🎉 You saved the hangman! +50 XP');
                userProgress.gameScores = userProgress.gameScores || {};
                userProgress.gameScores.game6 = Math.max(userProgress.gameScores.game6 || 0, 50);
                saveUserProgress();
                setTimeout(() => renderGamesHub(), 2000);
            } else if (hangmanWrong >= 6) {
                $('#hangmanLetters').html(`<div class="alert alert-danger">Game Over! The word was: ${hangmanWord}</div><button class="btn-google mt-2" onclick="renderHangmanGame()">Play Again</button>`);
            }
        }
        
        window.guessLetter = function(letter) {
            if (hangmanGuessed.includes(letter)) return;
            hangmanGuessed.push(letter);
            if (!hangmanWord.includes(letter)) hangmanWrong++;
            renderHangman();
        };
        
        const html = `
            <div class="fade-in-up"><button class="btn-outline-google btn-sm mb-3" onclick="renderGamesHub()"><i class="fas fa-arrow-left me-1"></i> Back to Games</button>
            <div class="game-panel text-center"><h3 class="h4 mb-3"><i class="fas fa-skull me-2"></i>Hangman</h3>
            <div id="hangmanWord"></div><div id="hangmanWrong"></div><div id="hangmanLetters"></div>
            <div class="mt-3"><button class="btn-outline-google btn-sm" onclick="renderHangmanGame()">New Word</button></div></div></div>`;
        $('#mainContent').html(html);
        renderHangman();
    }

    // ============================================
    function renderSpinWheelGame() {
        const challenges = [
            { text: "Say a sentence using 'de' and 'het'", points: 20 },
            { text: "Translate: 'I am learning Dutch'", points: 15, answer: "Ik leer Nederlands" },
            { text: "Name 3 animals in Dutch", points: 15, answer: "hond, kat, muis" },

            { text: "Count from 1 to 10 in Dutch", points: 15, answer: "een, twee, drie, vier, vijf, zes, zeven, acht, negen, tien" },
            { text: "Say 'Thank you very much' in Dutch", points: 10, answer: "Dank je wel" },
            { text: "Name 5 colors in Dutch", points: 20, answer: "rood, blauw, groen, geel, zwart" },
            { text: "What does 'gezellig' mean?", points: 15, answer: "cozy/pleasant" }
        ];
        let currentChallenge = null;
        
        function spinWheel() {
            if (wheelSpinning) return;
            wheelSpinning = true;
            let spins = 0;
            const interval = setInterval(() => {
                const idx = Math.floor(Math.random() * challenges.length);
                $('#wheelResult').text(challenges[idx].text);
                spins++;
                if (spins > 20) {
                    clearInterval(interval);
                    currentChallenge = challenges[Math.floor(Math.random() * challenges.length)];
                    $('#wheelResult').html(`<div class="alert alert-info"><strong>Challenge:</strong> ${currentChallenge.text}</div><input type="text" class="form-control mt-2" id="challengeAnswer" placeholder="Your answer..."><button class="btn-google mt-2" id="submitChallenge">Submit</button>`);
                    $('#submitChallenge').off('click').on('click', function() {
                        const userAnswer = $('#challengeAnswer').val().toLowerCase().trim();
                        if (currentChallenge.answer && userAnswer === currentChallenge.answer.toLowerCase()) {
                            addXP(currentChallenge.points);
                            showToast(`🎉 Correct! +${currentChallenge.points} XP`);
                            wheelSpinning = false;
                            setTimeout(() => renderSpinWheelGame(), 1500);
                        } else if (!currentChallenge.answer) {
                            addXP(currentChallenge.points);
                            showToast(`🎉 +${currentChallenge.points} XP for trying!`);
                            wheelSpinning = false;
                            setTimeout(() => renderSpinWheelGame(), 1500);
                        } else {
                            showToast(`❌ Incorrect. The answer was: ${currentChallenge.answer}`);
                            wheelSpinning = false;
                            setTimeout(() => renderSpinWheelGame(), 2000);
                        }
                    });
                    wheelSpinning = false;
                }
            }, 50);
        }
        
        const html = `
            <div class="fade-in-up"><button class="btn-outline-google btn-sm mb-3" onclick="renderGamesHub()"><i class="fas fa-arrow-left me-1"></i> Back to Games</button>

            <div id="wheelResult"></div></div></div>`;
        $('#mainContent').html(html);
        window.spinWheel = spinWheel;
    }

            `);
            
            $('.treasure-option').click(function() {
                const selected = $(this).data('answer');
                if (selected === word.english) {
                    levelScore += 20;
                    addXP(20);
                    showToast('✅ Treasure found! +20 XP');
                    level++;
                    loadLevel();
                } else {
                    showToast('❌ Wrong answer! Try again.');
                }
            });
        }
        
        const html = `
            <div class="fade-in-up"><button class="btn-outline-google btn-sm mb-3" onclick="renderGamesHub()"><i class="fas fa-arrow-left me-1"></i> Back to Games</button>
            <div class="game-panel" id="treasureContainer"></div></div>`;
        $('#mainContent').html(html);
        loadLevel();
    }
    
    // ============================================
    // RENDER OTHER PAGES (Simplified)
    // ============================================
    function renderHomePage() {
        currentView = 'home';
        if (!appData?.stories) return;
        const completedCount = userProgress.completedStories?.length || 0;
        const totalStories = appData.stories.length;
        const html = `<div class="fade-in-up"><div class="text-center mb-5"><h1 class="display-4 mb-3">🇳🇱 Learn Dutch Through Stories</h1><p class="lead text-muted">Read, listen, and master Dutch with engaging beginner stories</p><button class="btn-google mt-3" id="startBtn"><i class="fas fa-play me-2"></i> Start Your Journey</button></div><div class="row g-4 mb-5"><div class="col-md-3 col-6"><div class="stat-card"><div class="stat-number">${completedCount}/${totalStories}</div><div class="text-muted">Stories Done</div></div></div><div class="col-md-3 col-6"><div class="stat-card"><div class="stat-number">${userProgress.vocabularyMastered?.length || 0}</div><div class="text-muted">Words Mastered</div></div></div><div class="col-md-3 col-6"><div class="stat-card"><div class="stat-number">${userProgress.streak || 0}</div><div class="text-muted">Day Streak</div></div></div><div class="col-md-3 col-6"><div class="stat-card"><div class="stat-number">${userProgress.totalXP}</div><div class="text-muted">Total XP</div></div></div></div><div class="level-progress mb-4"><div class="d-flex justify-content-between mb-2"><span class="text-white">Level ${userProgress.level}</span><span class="text-white">${userProgress.totalXP % 100}/100 XP</span></div><div class="progress"><div class="progress-bar" style="width: ${userProgress.totalXP % 100}%"></div></div></div></div>`;
        $('#mainContent').html(html);
        $('#startBtn').click(() => renderStoriesPage());
    }
    
    function renderStoriesPage() {
        if (!appData?.stories) return;
        const html = `<div class="fade-in-up"><h2 class="h3 mb-4"><i class="fas fa-book me-2" style="color: var(--google-blue);"></i>All Stories</h2><div class="row">${appData.stories.map(story => `<div class="col-md-6 col-lg-4 mb-4"><div class="material-card" onclick="openStory(${story.id})"><div class="story-card-header"><div><div class="badge bg-white text-dark mb-2">#${story.id}</div><h5 class="mb-0 text-white">${story.title}</h5></div>${userProgress.completedStories?.includes(story.id) ? '<i class="fas fa-check-circle fa-2x"></i>' : ''}</div><div class="p-3"><div class="d-flex justify-content-between mb-2"><span><i class="far fa-clock me-1"></i> ${story.difficulty?.estimatedReadTime || 5} min</span><span><i class="fas fa-words me-1"></i> ${story.vocabulary?.length || 0} words</span></div><p class="small text-muted">${story.summaryEnglish?.substring(0, 80)}...</p></div></div></div>`).join('')}</div></div>`;
        $('#mainContent').html(html);
    }
    
    window.openStory = function(storyId) {
        currentStoryId = storyId;
        const story = appData.stories.find(s => s.id === storyId);
        const html = `<div class="fade-in-up"><button class="btn-outline-google btn-sm mb-3" onclick="renderStoriesPage()"><i class="fas fa-arrow-left me-1"></i> Back</button><div class="reading-panel"><div class="d-flex justify-content-between"><div><h2>${story.title}</h2><p class="text-muted">${story.titleEnglish}</p></div><button class="btn-outline-google btn-sm" onclick="speakText('${story.fullTextDutch.replace(/'/g, "\\'")}', 'nl-NL')"><i class="fas fa-volume-up"></i> Listen</button></div><ul class="nav nav-tabs mb-3"><li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#readTab">Read</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#vocabTab">Words</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#quizTab">Quiz</button></li><li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#gameTab">🎮 Games</button></li></ul><div class="tab-content"><div class="tab-pane fade show active" id="readTab"><div class="dutch-text">${story.fullTextDutch.replace(/\n/g, '<br>')}</div></div><div class="tab-pane fade" id="vocabTab">${story.vocabulary.map(w => `<div class="d-flex justify-content-between p-2 border-bottom"><span><strong>${w.dutch}</strong> → ${w.english}</span><button class="btn btn-sm btn-outline-google" onclick="speakText('${w.dutch}', 'nl-NL')"><i class="fas fa-volume-up"></i></button></div>`).join('')}</div><div class="tab-pane fade" id="quizTab"><div id="storyQuiz"></div><button class="btn-google mt-3" id="submitStoryQuiz">Submit</button><div id="storyQuizResult"></div></div><div class="tab-pane fade" id="gameTab"><div class="text-center"><p class="mb-3">Play games using vocabulary from this story!</p><button class="btn-google" onclick="renderGamesHub()"><i class="fas fa-gamepad me-2"></i>Go to Games Hub</button></div></div></div></div></div>`;
        $('#mainContent').html(html);
        let quizAnswers = {};
        story.questions.forEach((q, idx) => {
            $(`#storyQuiz`).append(`<div class="mb-3"><strong>${idx+1}. ${q.text}</strong><div class="mt-2">${q.options.map((opt, i) => `<div class="quiz-option" data-q="${q.id}" data-opt="${i}">${String.fromCharCode(65+i)}. ${opt}</div>`).join('')}</div></div>`);
        });
        $('.quiz-option').click(function() { $(this).parent().find('.quiz-option').removeClass('selected'); $(this).addClass('selected'); quizAnswers[$(this).data('q')] = $(this).data('opt'); });
        $('#submitStoryQuiz').click(() => {
            let correct = 0;
            story.questions.forEach(q => { if (quizAnswers[q.id] === q.correctIndex) correct++; });
            if (correct >= 4 && !userProgress.completedStories.includes(storyId)) { userProgress.completedStories.push(storyId); addXP(50); }
            saveUserProgress();
            $('#storyQuizResult').html(`<div class="alert alert-info">Score: ${correct}/${story.questions.length}</div>`);
        });
    };
    
    function renderVocabularyPage() {
        if (!appData?.stories) return;
        const allWords = [];
        appData.stories.forEach(s => s.vocabulary?.forEach(w => { if (!allWords.find(x => x.dutch === w.dutch)) allWords.push(w); }));
        const html = `<div class="fade-in-up"><h2 class="h3 mb-4"><i class="fas fa-graduation-cap me-2"></i>My Vocabulary</h2><div class="row g-4 mb-4"><div class="col-md-4"><div class="stat-card"><div class="stat-number">${userProgress.vocabularyMastered?.length || 0}</div><div>Mastered</div></div></div><div class="col-md-4"><div class="stat-card"><div class="stat-number">${allWords.length}</div><div>Total Words</div></div></div><div class="col-md-4"><div class="stat-card"><div class="stat-number">${userProgress.wordReviewQueue?.length || 0}</div><div>To Review</div></div></div></div><div class="reading-panel"><input type="text" class="form-control mb-3" id="vocabSearch" placeholder="Search..."><div id="vocabList">${allWords.map(w => `<div class="d-flex justify-content-between p-2 border-bottom"><span><strong>${w.dutch}</strong> → ${w.english}</span><div><button class="btn btn-sm btn-outline-google me-1" onclick="speakText('${w.dutch}', 'nl-NL')"><i class="fas fa-volume-up"></i></button><button class="btn btn-sm btn-outline-success" onclick="markWordKnown('${w.dutch}')"><i class="fas fa-check"></i></button></div></div>`).join('')}</div></div></div>`;
        $('#mainContent').html(html);
        $('#vocabSearch').on('input', function() { const s = $(this).val().toLowerCase(); $('#vocabList > div').each(function() { $(this).toggle($(this).text().toLowerCase().includes(s)); }); });
    }
    
    window.markWordKnown = function(word) {
        userProgress.vocabularyLearning[word] = Math.min(100, (userProgress.vocabularyLearning[word] || 0) + 25);
        if (!userProgress.vocabularyMastered.includes(word) && userProgress.vocabularyLearning[word] >= 80) userProgress.vocabularyMastered.push(word);
        saveUserProgress();
        showToast(`✅ "${word}" strengthened!`);
        renderVocabularyPage();
    };
    
    function renderProgressPage() {
        const html = `<div class="fade-in-up"><h2 class="h3 mb-4"><i class="fas fa-chart-line me-2"></i>Your Progress</h2><div class="row g-4"><div class="col-md-6"><div class="reading-panel"><h5>Story Completion</h5><canvas id="progressChart" height="200"></canvas></div></div><div class="col-md-6"><div class="reading-panel"><h5>XP Progress</h5><canvas id="xpChart" height="200"></canvas></div></div></div><div class="reading-panel mt-4"><h5>Achievements</h5><div class="row">${Object.values(achievements).map(a => `<div class="col-md-4 col-6 text-center mb-3"><i class="fas ${a.icon} fa-2x ${userProgress.badges?.includes(a.id) ? 'text-success' : 'text-muted'}"></i><p class="small">${a.name}</p></div>`).join('')}</div></div></div>`;
        $('#mainContent').html(html);
        setTimeout(() => {
            const ctx = document.getElementById('progressChart')?.getContext('2d');
            if (ctx) new Chart(ctx, { type: 'doughnut', data: { labels: ['Completed', 'Remaining'], datasets: [{ data: [userProgress.completedStories?.length || 0, (appData?.stories?.length || 10) - (userProgress.completedStories?.length || 0)], backgroundColor: ['#1A73E8', '#E8EAED'] }] } });
            const ctx2 = document.getElementById('xpChart')?.getContext('2d');
            if (ctx2) new Chart(ctx2, { type: 'bar', data: { labels: ['Total XP'], datasets: [{ data: [userProgress.totalXP], backgroundColor: '#34A853' }] } });
        }, 100);
    }
    
    function renderStrategiesPage() {
        const strategies = [
            { name: "Spaced Repetition", desc: "Review at optimal intervals", icon: "fa-clock" },
            { name: "Active Recall", desc: "Test yourself, don't just read", icon: "fa-brain" },
            { name: "Interleaving", desc: "Mix different topics", icon: "fa-random" },
            { name: "Pomodoro", desc: "25 min study, 5 min break", icon: "fa-hourglass-half" }
        ];
        const html = `<div class="fade-in-up"><h2 class="h3 mb-4"><i class="fas fa-lightbulb me-2"></i>Learning Strategies</h2><div class="row g-4">${strategies.map(s => `<div class="col-md-6 col-lg-3"><div class="material-card p-4 text-center"><i class="fas ${s.icon} fa-3x mb-3" style="color: var(--google-blue);"></i><h5>${s.name}</h5><p class="small text-muted">${s.desc}</p></div></div>`).join('')}</div></div>`;
        $('#mainContent').html(html);
    }
</script>
</body>
</html>
